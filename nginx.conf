# ─── Nginx — Cursus (cursus.devrohan.cloud) ───────────────────────────────────
# Copier vers /etc/nginx/sites-available/cursus puis:
#   ln -sf /etc/nginx/sites-available/cursus /etc/nginx/sites-enabled/cursus
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name cursus.devrohan.cloud;

    # ── SSL (Certbot / Let's Encrypt) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cursus.devrohan.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursus.devrohan.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Sécurité ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── IMPORTANT : ne PAS cacher le HTML et le service worker ────────────────
    # Nginx doit TRANSMETTRE les headers Cache-Control d'Express, pas les écraser

    # Service worker : JAMAIS de cache (le navigateur doit checker les mises à jour)
    location = /sw.js {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Pages HTML : pas de cache (toujours la dernière version)
    location ~ \.(html)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Assets statiques hashés (JS/CSS de Vite) : cache long (1 an)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|mp4)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    # ── Proxy principal ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pas de cache par défaut — laisser Express décider
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache" always;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    client_max_body_size 60M;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name cursus.devrohan.cloud;
    return 301 https://$host$request_uri;
}
