# ─── Nginx - Cursus Landing (cursus.school) ──────────────────────────────
# Copier vers /etc/nginx/sites-available/cursus-landing puis:
#   ln -sf /etc/nginx/sites-available/cursus-landing /etc/nginx/sites-enabled/cursus-landing
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    http2 on;
    server_name cursus.school;

    # ── SSL (Certbot / Let's Encrypt) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cursus.school/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursus.school/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Sécurité ──────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Root ──────────────────────────────────────────────────────────────
    root /opt/cursus/landing;
    index index.html;

    # ── HTML : pas de cache ───────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # ── CSS & JS : cache 1 semaine ────────────────────────────────────────
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # ── Images & fonts : cache 1 an ───────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ── Proxy /download vers l'app backend ────────────────────────────────
    location = /download {
        proxy_pass http://127.0.0.1:3001/download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Assets depuis le backend (icônes, etc.) ───────────────────────────
    location /assets/ {
        proxy_pass http://127.0.0.1:3001/assets/;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ── Fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name cursus.school;
    return 301 https://$host$request_uri;
}
