# ─── Nginx - Cursus Admin (admin.cursus.school) ────────────────────────────
# Copier vers /etc/nginx/sites-available/cursus-admin puis:
#   ln -sf /etc/nginx/sites-available/cursus-admin /etc/nginx/sites-enabled/cursus-admin
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    http2 on;
    server_name admin.cursus.school;

    # ── SSL (Certbot / Let's Encrypt) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/admin.cursus.school/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.cursus.school/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Sécurité ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 60M;

    # ── Racine → page admin ────────────────────────────────────────────────────
    location = / {
        proxy_pass http://127.0.0.1:3001/admin-monitor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── Assets statiques de l'admin (JS, CSS, icônes...) ─────────────────────
    location /assets/ {
        proxy_pass http://127.0.0.1:3001/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ── API (les appels depuis window.location.origin dans app.js) ────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache" always;
    }

    # ── WebSocket (Socket.IO pour les stats temps réel) ───────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.cursus.school;
    return 301 https://$host$request_uri;
}
