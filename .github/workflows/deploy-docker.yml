name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          tags: |
            ghcr.io/rohanfosse/cursus:latest
            ghcr.io/rohanfosse/cursus:${{ github.sha }}

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Call /deploy webhook
        run: |
          STATUS=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
            --max-time 30 --connect-timeout 15 \
            --retry 3 --retry-delay 5 --retry-connrefused \
            -X POST "${{ secrets.VITE_SERVER_URL }}/webhook/deploy" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/deploy_resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Deploy webhook returned HTTP $STATUS"
            exit 1
          fi
