name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          tags: |
            ghcr.io/rohanfosse/cursus:latest
            ghcr.io/rohanfosse/cursus:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Wait for server health
        run: |
          echo "Waiting for server to be reachable..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              "${{ secrets.VITE_SERVER_URL }}/health" 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Server healthy after $((i * 5))s"
              break
            fi
            echo "Attempt $i/12 - status $STATUS, retrying in 5s..."
            sleep 5
          done

      - name: Call /deploy webhook
        run: |
          STATUS=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
            --max-time 60 --connect-timeout 30 \
            --retry 3 --retry-delay 10 --retry-connrefused \
            -X POST "${{ secrets.VITE_SERVER_URL }}/webhook/deploy" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/deploy_resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Deploy webhook returned HTTP $STATUS"
            exit 1
          fi

  auto-release:
    name: Auto-tag & release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag and trigger Release if new version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping."
          else
            echo "Creating tag $VERSION..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "$VERSION"
            echo "Triggering Release workflow for $VERSION..."
            gh workflow run release.yml -f tag="$VERSION" --ref "$VERSION"
            echo "Release workflow triggered for $VERSION"
          fi
