name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          tags: |
            ghcr.io/rohanfosse/cursus:latest
            ghcr.io/rohanfosse/cursus:${{ github.sha }}

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            cd /opt/cursus/repo
            git fetch origin main
            git reset --hard origin/main

            cd /opt/cursus
            docker compose build
            docker compose up -d --force-recreate
            docker image prune -f
            docker builder prune -af --keep-storage=500MB

            echo "Deploy complete - $(docker ps --format '{{.Status}}' --filter name=cursus-server)"
