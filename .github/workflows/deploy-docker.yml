name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            cd /opt/cursus/repo
            git fetch origin main
            git reset --hard origin/main

            cd /opt/cursus
            docker compose build --no-cache
            docker compose up -d --force-recreate
            docker image prune -f

            echo "Deploy complete - $(docker ps --format '{{.Status}}' --filter name=cursus-server)"
