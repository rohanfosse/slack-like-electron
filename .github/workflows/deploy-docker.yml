name: Deploy (manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          tags: |
            ghcr.io/rohanfosse/cursus:latest
            ghcr.io/rohanfosse/cursus:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Call /deploy webhook
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              "${{ secrets.VITE_SERVER_URL }}/health" 2>/dev/null || true)
            [ "$STATUS" = "200" ] && break
            sleep 5
          done
          STATUS=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
            --max-time 60 --connect-timeout 30 \
            --retry 3 --retry-delay 10 --retry-connrefused \
            -X POST "${{ secrets.VITE_SERVER_URL }}/webhook/deploy" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/deploy_resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Deploy webhook returned HTTP $STATUS"
            exit 1
          fi
