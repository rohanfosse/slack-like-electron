name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3 for Node.js
        run: npm rebuild better-sqlite3

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.thresholdAutoUpdate=false

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && hashFiles('coverage/coverage-summary.json') != ''
        uses: jaywcjlove/coverage-badges-cli@main
        with:
          source: coverage/coverage-summary.json
          output: coverage/badge.svg

      - name: Prepare gh-pages content
        if: github.ref == 'refs/heads/main' && hashFiles('coverage/coverage-summary.json') != ''
        run: |
          mkdir -p gh-pages/badges
          cp coverage/badge.svg gh-pages/badges/ 2>/dev/null || true
          cat > gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0;url=https://cursus.school" />
            <title>Cursus</title>
          </head>
          <body>
            <p>Redirection vers <a href="https://cursus.school">cursus.school</a></p>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main' && hashFiles('gh-pages/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: true

  e2e:
    name: E2E Tests (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3 for Node.js
        run: npm rebuild better-sqlite3

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build web frontend
        run: npm run build:web
        env:
          VITE_SERVER_URL: http://localhost:3001

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        env:
          NODE_ENV: test
          JWT_SECRET: e2e-test-secret-for-ci-only-32chars!!

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Count lines of code
        id: loc
        run: |
          TOTAL=$(find src/ server/ -name '*.ts' -o -name '*.vue' -o -name '*.js' | xargs wc -l | tail -1 | awk '{print $1}')
          COMPONENTS=$(find src/renderer/src/components -name '*.vue' | wc -l)
          COMPOSABLES=$(find src/renderer/src/composables -name '*.ts' | wc -l)
          TESTS=$(find tests/ -name '*.test.*' | wc -l)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT
          echo "composables=$COMPOSABLES" >> $GITHUB_OUTPUT
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "### Code Stats" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total lines | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Vue components | $COMPONENTS |" >> $GITHUB_STEP_SUMMARY
          echo "| Composables | $COMPOSABLES |" >> $GITHUB_STEP_SUMMARY
          echo "| Test files | $TESTS |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy Docker (main only, after tests pass) ──────────────────────────────
  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          tags: |
            ghcr.io/rohanfosse/cursus:latest
            ghcr.io/rohanfosse/cursus:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Call /deploy webhook
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              "${{ secrets.VITE_SERVER_URL }}/health" 2>/dev/null || true)
            [ "$STATUS" = "200" ] && break
            sleep 5
          done
          STATUS=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
            --max-time 60 --connect-timeout 30 \
            --retry 3 --retry-delay 10 --retry-connrefused \
            -X POST "${{ secrets.VITE_SERVER_URL }}/webhook/deploy" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/deploy_resp.json
          if [ "$STATUS" != "200" ]; then
            echo "Deploy webhook returned HTTP $STATUS"
            exit 1
          fi

      - name: Auto-tag & trigger Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping release."
          else
            echo "Creating tag $VERSION..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "$VERSION"
            echo "Triggering Release workflow for $VERSION..."
            gh workflow run release.yml -f tag="$VERSION" --ref "$VERSION"
          fi
