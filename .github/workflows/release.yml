name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.6)'
        required: true

permissions:
  contents: write

jobs:
  # ── Gate: run tests before building releases ─────────────────────────────────
  preflight:
    name: Preflight Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild better-sqlite3
      - run: npm run typecheck
      - run: npx vitest run

  # ── Build Windows (.exe) ─────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: preflight
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check runtime dependencies
        run: node scripts/check-runtime-deps.js

      - name: Build & package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: npm run build:win

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  # ── Build macOS (.dmg) ───────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check runtime dependencies
        run: node scripts/check-runtime-deps.js

      - name: Build & package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: npm run build:mac

      - name: Upload .dmg to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
