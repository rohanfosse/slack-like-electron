name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: npm run build:web

      - name: Deploy via SSH
        env:
          SSH_KEY:         ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts

          # Upload dist-web/ via rsync
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist-web/ \
            root@148.230.115.73:/opt/ceslack/dist-web/

          # Pull server code, install deps, restart PM2
          ssh -i ~/.ssh/deploy_key root@148.230.115.73 \
            "cd /opt/ceslack && git pull origin main && npm install --omit=dev --ignore-scripts 2>&1 | tail -3 && pm2 restart ceslack-server && echo Deploy OK"
