name: Deploy Web

on:
  push:
    branches: [main]
    # Ignorer les commits automatiques du CI (dist-web)
    paths-ignore:
      - 'dist-web/**'

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: npm run build:web

      - name: Commit dist-web to git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist-web/
          git diff --cached --quiet && echo "No changes in dist-web" || \
            git commit -m "chore: build dist-web [skip ci]"
          git push

      - name: Trigger deploy webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          SERVER_URL:    ${{ secrets.VITE_SERVER_URL }}
        run: |
          curl -s -X POST \
            -H "x-deploy-secret: $DEPLOY_SECRET" \
            -H "Content-Type: application/json" \
            "${SERVER_URL}/webhook/deploy" | cat
