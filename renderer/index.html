<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>CESI Classroom</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

<!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div id="app-logo">
      <div class="logo-mark">CC</div>
      <span class="logo-text">CESI Classroom</span>
    </div>
    <div id="teacher-badge">
      <div class="avatar teacher-avatar">RF</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">Rohan Fosse</span>
        <span class="sidebar-user-role">Professeur</span>
      </div>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
</aside>

<!-- ════════════════════════════════════════
     ZONE CENTRALE
════════════════════════════════════════ -->
<main id="main-area">

  <header id="channel-header">
    <div id="channel-title">
      <span id="channel-icon">#</span>
      <span id="channel-name">Selectionnez un canal</span>
      <span id="channel-type-badge" class="channel-type-badge hidden"></span>
    </div>
    <div id="header-actions">
      <div id="search-wrapper" class="hidden">
        <input id="search-input" type="text" placeholder="Rechercher dans ce canal…" autocomplete="off" />
        <span id="search-results-count"></span>
        <button id="btn-search-clear" title="Effacer">&#10005;</button>
      </div>
      <button id="btn-search" class="btn-ghost" title="Rechercher">Rechercher</button>
      <button id="btn-travaux" class="btn-ghost">Travaux</button>
      <button id="btn-mes-travaux" class="btn-ghost" style="display:none">Mes travaux</button>
    </div>
  </header>

  <div id="messages-container">
    <div id="messages-list"></div>
  </div>

  <footer id="message-input-area">
    <div id="message-input-wrapper">
      <textarea id="message-input" placeholder="Envoyer un message…" rows="1"></textarea>
      <button id="btn-send" title="Envoyer (Entree)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </footer>
</main>

<!-- ════════════════════════════════════════
     PANEL DROIT (travaux ou profil)
════════════════════════════════════════ -->
<aside id="right-panel" class="hidden"></aside>

<!-- ════════════════════════════════════════
     MODAL — DEPOTS D'UN TRAVAIL
════════════════════════════════════════ -->
<div id="modal-depots-overlay" class="modal-overlay hidden">
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-header-info">
        <h3 id="modal-depots-title">Depots</h3>
        <div class="modal-header-sub" id="modal-depots-header-sub"></div>
      </div>
      <button id="modal-depots-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="modal-body" id="modal-depots-body"></div>
    <div class="modal-footer">
      <div class="depot-upload-row">
        <select id="depot-student-select" class="form-select">
          <option value="">Selectionner un etudiant</option>
        </select>
        <button id="modal-depot-btn" class="btn-primary">Deposer un fichier</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — SUIVI DES DEPOTS
════════════════════════════════════════ -->
<div id="modal-suivi-overlay" class="modal-overlay hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-header-info">
        <h3 id="suivi-title">Suivi</h3>
        <div class="modal-header-sub">
          <span id="suivi-deadline" class="deadline-badge deadline-ok"></span>
        </div>
      </div>
      <button id="modal-suivi-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="suivi-progress-wrapper">
      <div class="suivi-progress-label">
        <span id="suivi-progress-label-count"></span>
        <span id="suivi-progress-label-pct"></span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="suivi-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="modal-body" id="suivi-body"></div>
    <div class="modal-footer spread">
      <button id="btn-export-csv" class="btn-ghost">Exporter CSV</button>
      <button id="modal-suivi-close-2" class="btn-primary" onclick="document.getElementById('modal-suivi-overlay').classList.add('hidden')">Fermer</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — ATTRIBUER UNE NOTE
════════════════════════════════════════ -->
<div id="modal-note-overlay" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Attribuer une note</h3>
      <button id="modal-note-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="modal-note-body">
      <label class="form-label" for="note-input">Note sur 20</label>
      <input
        type="number"
        id="note-input"
        class="note-big-input"
        min="0" max="20" step="0.5"
        placeholder="ex : 15.5"
      />
      <span id="note-error" class="field-error"></span>
    </div>
    <div class="modal-footer">
      <button id="modal-note-cancel" class="btn-ghost">Annuler</button>
      <button id="modal-note-confirm" class="btn-primary">Valider</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — NOUVEAU TRAVAIL
════════════════════════════════════════ -->
<div id="modal-new-travail-overlay" class="modal-overlay hidden">
  <div class="modal modal-md">
    <div class="modal-header">
      <h3>Nouveau travail</h3>
      <button id="modal-new-travail-close" class="btn-ghost">Fermer</button>
    </div>
    <form id="form-new-travail" style="padding:20px;display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label class="form-label" for="nt-title">Titre</label>
        <input type="text" id="nt-title" class="form-input" placeholder="Intitule du travail" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="nt-description">Consignes</label>
        <textarea id="nt-description" class="form-textarea" rows="3" placeholder="Description et consignes…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="nt-group">Groupe (optionnel)</label>
        <select id="nt-group" class="form-select">
          <option value="">Toute la promotion</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="nt-deadline">Date limite</label>
        <input type="datetime-local" id="nt-deadline" class="form-input" required />
      </div>
      <div class="modal-footer" style="padding:0;border:none;">
        <button type="button" id="btn-cancel-travail" class="btn-ghost">Annuler</button>
        <button type="submit" class="btn-primary">Creer le travail</button>
      </div>
    </form>
  </div>
</div>

<!-- ════════════════════════════════════════
     ECRAN DE CONNEXION
════════════════════════════════════════ -->
<div id="login-overlay">
  <div id="login-panel">
    <div id="login-logo">
      <div class="logo-mark">CC</div>
      <span class="logo-text">CESI Classroom</span>
    </div>
    <h2 id="login-title">Qui etes-vous ?</h2>
    <p id="login-subtitle">Selectionnez votre identite pour continuer</p>
    <div id="login-identity-grid"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     TOAST
════════════════════════════════════════ -->
<div id="app-toast" class="hidden"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
