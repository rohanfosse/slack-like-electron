<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>CESI Classroom</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

<!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div id="app-logo">
      <div class="logo-mark">CC</div>
      <span class="logo-text">CESI Classroom</span>
    </div>
    <div id="teacher-badge">
      <div class="avatar teacher-avatar">RF</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">Rohan Fosse</span>
        <span class="sidebar-user-role">Professeur</span>
      </div>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
</aside>

<!-- ════════════════════════════════════════
     ZONE CENTRALE
════════════════════════════════════════ -->
<main id="main-area">

  <header id="channel-header">
    <div id="channel-title">
      <span id="channel-icon">#</span>
      <span id="channel-name">Selectionnez un canal</span>
      <span id="channel-type-badge" class="channel-type-badge hidden"></span>
    </div>
    <div id="header-actions">
      <div id="search-wrapper" class="hidden">
        <input id="search-input" type="text" placeholder="Rechercher dans ce canal…" autocomplete="off" />
        <span id="search-results-count"></span>
        <button id="btn-search-clear" title="Effacer">&#10005;</button>
      </div>
      <button id="btn-search" class="btn-ghost" title="Rechercher">Rechercher</button>
      <button id="btn-timeline" class="btn-ghost">Timeline</button>
      <button id="btn-travaux" class="btn-ghost">Travaux</button>
      <button id="btn-mes-travaux" class="btn-ghost" style="display:none">Mes travaux</button>
    </div>
  </header>

  <div id="messages-container">
    <div id="messages-list"></div>
  </div>

  <footer id="message-input-area">
    <div id="message-input-wrapper">
      <textarea id="message-input" placeholder="Envoyer un message…" rows="1"></textarea>
      <button id="btn-send" title="Envoyer (Entree)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </footer>
</main>

<!-- ════════════════════════════════════════
     PANEL DROIT (travaux ou profil)
════════════════════════════════════════ -->
<aside id="right-panel" class="hidden"></aside>

<!-- ════════════════════════════════════════
     MODAL — DEPOTS D'UN TRAVAIL
════════════════════════════════════════ -->
<div id="modal-depots-overlay" class="modal-overlay hidden">
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-header-info">
        <h3 id="modal-depots-title">Depots</h3>
        <div class="modal-header-sub" id="modal-depots-header-sub"></div>
      </div>
      <button id="modal-depots-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="modal-body" id="modal-depots-body"></div>
    <div class="modal-footer">
      <div class="depot-upload-row">
        <select id="depot-student-select" class="form-select">
          <option value="">Selectionner un etudiant</option>
        </select>
        <button id="modal-depot-btn" class="btn-primary">Deposer un fichier</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — SUIVI DES DEPOTS
════════════════════════════════════════ -->
<div id="modal-suivi-overlay" class="modal-overlay hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-header-info">
        <h3 id="suivi-title">Suivi</h3>
        <div class="modal-header-sub">
          <span id="suivi-deadline" class="deadline-badge deadline-ok"></span>
        </div>
      </div>
      <button id="modal-suivi-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="suivi-progress-wrapper">
      <div class="suivi-progress-label">
        <span id="suivi-progress-label-count"></span>
        <span id="suivi-progress-label-pct"></span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="suivi-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="modal-body" id="suivi-body"></div>
    <div class="modal-footer spread">
      <button id="btn-export-csv" class="btn-ghost">Exporter CSV</button>
      <button id="modal-suivi-close-2" class="btn-primary" onclick="document.getElementById('modal-suivi-overlay').classList.add('hidden')">Fermer</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — ATTRIBUER UNE NOTE
════════════════════════════════════════ -->
<div id="modal-note-overlay" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Attribuer une note</h3>
      <button id="modal-note-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="modal-note-body">
      <label class="form-label" for="note-input">Note sur 20</label>
      <input
        type="number"
        id="note-input"
        class="note-big-input"
        min="0" max="20" step="0.5"
        placeholder="ex : 15.5"
      />
      <span id="note-error" class="field-error"></span>
    </div>
    <div class="modal-footer">
      <button id="modal-note-cancel" class="btn-ghost">Annuler</button>
      <button id="modal-note-confirm" class="btn-primary">Valider</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — NOUVEAU TRAVAIL
════════════════════════════════════════ -->
<div id="modal-new-travail-overlay" class="modal-overlay hidden">
  <div class="modal modal-md">
    <div class="modal-header">
      <h3>Nouveau travail</h3>
      <button id="modal-new-travail-close" class="btn-ghost">Fermer</button>
    </div>
    <form id="form-new-travail" style="padding:20px;display:flex;flex-direction:column;gap:14px;">

      <!-- Type : Devoir ou Jalon -->
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="nt-type-toggle">
          <label class="nt-type-option">
            <input type="radio" name="nt-type" value="devoir" checked />
            <span>Devoir</span>
          </label>
          <label class="nt-type-option">
            <input type="radio" name="nt-type" value="jalon" />
            <span>Jalon</span>
          </label>
        </div>
        <p class="form-hint" id="nt-type-hint">Un jalon est un evenement sans rendu (soutenance, revue…)</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="nt-title">Titre</label>
        <input type="text" id="nt-title" class="form-input" placeholder="Intitule du travail" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="nt-description">Description</label>
        <textarea id="nt-description" class="form-textarea" rows="3" placeholder="Consignes, informations…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="nt-category">Categorie</label>
        <select id="nt-category" class="form-select" required>
          <option value="TP">TP</option>
          <option value="Projet">Projet</option>
          <option value="Devoir">Devoir</option>
          <option value="Examen">Examen</option>
          <option value="Rendu">Rendu</option>
        </select>
      </div>

      <!-- Champs specifiques aux devoirs (caches pour les jalons) -->
      <div id="nt-devoir-only-fields">
        <div class="form-group">
          <label class="form-label" for="nt-group">Groupe (optionnel)</label>
          <select id="nt-group" class="form-select">
            <option value="">Toute la promotion</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="nt-deadline">Date limite / Date du jalon</label>
        <input type="datetime-local" id="nt-deadline" class="form-input" required />
      </div>

      <label class="form-check-label">
        <input type="checkbox" id="nt-draft" />
        Enregistrer comme brouillon (invisible aux etudiants)
      </label>

      <div class="modal-footer" style="padding:0;border:none;">
        <button type="button" id="btn-cancel-travail" class="btn-ghost">Annuler</button>
        <button type="submit" class="btn-primary">Creer</button>
      </div>
    </form>
  </div>
</div>

<!-- ════════════════════════════════════════
     MODAL — RESSOURCES D'UN TRAVAIL
════════════════════════════════════════ -->
<div id="modal-ressources-overlay" class="modal-overlay hidden">
  <div class="modal modal-md">
    <div class="modal-header">
      <div class="modal-header-info">
        <h3 id="modal-ressources-title">Ressources</h3>
      </div>
      <button id="modal-ressources-close" class="btn-ghost">Fermer</button>
    </div>
    <div class="modal-body" id="ressources-list"></div>
    <div id="ressources-add-zone" class="modal-footer" style="flex-direction:column;align-items:stretch;gap:10px;">
      <form id="form-add-ressource" style="display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;gap:16px;align-items:center;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="ressource-type" value="link" checked /> Lien URL
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="ressource-type" value="file" /> Fichier local
          </label>
        </div>
        <input type="text" id="ressource-name-input" class="form-input" placeholder="Nom de la ressource" required />
        <div id="ressource-field-link">
          <input type="url" id="ressource-link-input" class="form-input" placeholder="https://..." />
        </div>
        <div id="ressource-field-file" style="display:none;display:flex;gap:8px;align-items:center;">
          <input type="text" id="ressource-path-input" class="form-input" placeholder="Chemin du fichier…" readonly style="flex:1" />
          <button type="button" id="btn-ressource-add-file" class="btn-ghost">Parcourir</button>
        </div>
        <button type="submit" class="btn-primary">Ajouter</button>
      </form>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     TIMELINE
════════════════════════════════════════ -->
<div id="timeline-overlay" class="fullscreen-overlay hidden">
  <div id="timeline-panel">
    <div id="timeline-header">
      <div>
        <h2 id="timeline-title">Timeline des travaux</h2>
        <div id="timeline-filters" class="timeline-filters">
          <button class="timeline-filter-btn" data-cat="TP" style="--cat-color:#4A90D9">TP</button>
          <button class="timeline-filter-btn" data-cat="Projet" style="--cat-color:#7B68EE">Projet</button>
          <button class="timeline-filter-btn" data-cat="Devoir" style="--cat-color:#50C878">Devoir</button>
          <button class="timeline-filter-btn" data-cat="Examen" style="--cat-color:#E74C3C">Examen</button>
          <button class="timeline-filter-btn" data-cat="Rendu" style="--cat-color:#F39C12">Rendu</button>
        </div>
      </div>
      <button id="btn-timeline-close" class="btn-ghost">Fermer</button>
    </div>
    <div id="timeline-body"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     ECRAN DE CONNEXION
════════════════════════════════════════ -->
<div id="login-overlay">
  <!-- Contenu rendu dynamiquement par login.js -->
</div>

<!-- ════════════════════════════════════════
     TOAST
════════════════════════════════════════ -->
<div id="app-toast" class="hidden"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
