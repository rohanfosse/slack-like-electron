<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0F0D1A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-glow {
      position: absolute;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(129,140,248,0.35) 0%, transparent 70%);
      border-radius: 50%;
      animation: glow 2.4s ease-in-out infinite;
    }
    .logo {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    .name {
      margin-top: 18px;
      font-size: 24px; font-weight: 800;
      color: #F1F0FF; letter-spacing: 0.8px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.3s forwards;
    }
    .subtitle {
      margin-top: 5px;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.5s forwards;
    }
    .loader {
      margin-top: 28px;
      width: 140px; height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.7s forwards;
    }
    .loader-bar {
      width: 40%; height: 100%;
      background: linear-gradient(90deg, #6366F1, #818CF8, #34D399);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    .loading-text {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.9s forwards;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes glow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <img class="logo" src="splash-logo.png" alt="" />
  </div>
  <div class="name">Cursus</div>
  <div class="subtitle">Plateforme de formation</div>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="loading-text">Chargement...</div>
</body>
</html>
