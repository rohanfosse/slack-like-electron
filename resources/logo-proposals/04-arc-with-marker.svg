<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Arc indigo + point d'arrivee emerald = "trajectoire qui aboutit".
       Aligne sur la palette sectorielle landing (indigo chat + emerald devoirs).
       Plus narratif : on lit "depart -> objectif". -->
