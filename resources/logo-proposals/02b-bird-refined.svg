<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Oiseau v2 (sophistique) :
       - Courbes Bezier fluides (queue qui s'amincit, pointe nette)
       - 2 degrades subtils alignes palette landing :
           * aile inferieure : bleu indigo -> bleu clair
           * aile superieure : emerald -> mint
       - Composition plus dynamique : croisement central, decalage haut-droite
       - Variation de stroke implicite via le shape (epais a la base, fin a la pointe) -->
  <defs>
    <linearGradient id="wingBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1E40AF" />
      <stop offset="55%"  stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <linearGradient id="wingGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#047857" />
      <stop offset="55%"  stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>

  <!-- Aile inferieure (bleue) : courbe ascendante avec queue affinee a gauche -->
  <path d="
    M 28 184
    C 44 168, 64 152, 92 144
    C 124 134, 156 132, 184 138
    L 208 116
    L 204 156
    L 184 138
    C 154 134, 124 142, 100 158
    C 80 172, 60 188, 44 204
    Z"
    fill="url(#wingBlue)" />

  <!-- Aile superieure (verte) : courbe descendante miroir, decalee haut-droite -->
  <path d="
    M 80 204
    C 100 156, 132 124, 168 110
    C 196 100, 220 100, 236 108
    L 232 80
    L 240 124
    L 220 110
    C 192 106, 164 116, 140 138
    C 116 162, 100 196, 92 224
    Z"
    fill="url(#wingGreen)" />
</svg>
