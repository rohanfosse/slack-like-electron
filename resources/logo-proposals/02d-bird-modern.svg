<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Variante "moderne" :
       - 2 ailes en formes plus geometriques (croissant)
       - Indigo + emerald saturees alignees palette
       - Pointes franches, courbes inspirees de l'origami
       - Composition asymetrique : aile basse plus grande, aile haute affinee
       - Style proche d'un logo SaaS contemporain (Notion / Stripe / Replit) -->
  <defs>
    <linearGradient id="modernBlue" x1="20%" y1="100%" x2="80%" y2="20%">
      <stop offset="0%"   stop-color="#3730A3" />
      <stop offset="50%"  stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <linearGradient id="modernGreen" x1="20%" y1="100%" x2="80%" y2="20%">
      <stop offset="0%"   stop-color="#065F46" />
      <stop offset="50%"  stop-color="#059669" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>

  <!-- Aile basse (plus large, ancrage visuel) -->
  <path d="
    M 24 200
    C 56 168, 100 148, 152 144
    C 176 142, 196 144, 212 152
    L 224 132
    L 220 168
    L 200 156
    C 168 152, 132 162, 100 184
    C 76 200, 56 218, 40 232
    Z"
    fill="url(#modernBlue)" />

  <!-- Aile haute (plus fine, mouvement) -->
  <path d="
    M 64 224
    C 96 168, 144 132, 192 116
    C 212 110, 228 110, 240 116
    L 248 96
    L 244 132
    L 224 122
    C 200 120, 176 130, 156 146
    C 132 166, 110 198, 92 236
    Z"
    fill="url(#modernGreen)"
    opacity="0.95" />
</svg>
