project: "Bloc 4 — Programmation Web"
module: "CPIA2 · Développement Web"
author: "CESI CPIA2 2025-2026"
summary: >
  Bloc 4 — Programmation Web : fondamentaux HTTP/Apache, PHP dynamique,
  architecture MVC avec Composer et Twig, PDO et authentification,
  dynamisation front avec JavaScript. Cours PBL organisé en prosits,
  workshops, guides de référence et mini-projets d'entraînement.

chapters:
  - title: "Accueil — Présentation du bloc"
    path: "README.md"
    duration: 10
    summary: "Objectifs, déroulement, phases et livrables du bloc 4."

  # ── Projet fil rouge ──────────────────────────────────────────────
  - title: "Projet — Plateforme de Mobilité Internationale"
    path: "projet.md"
    duration: 30
    summary: "Contexte, besoins et cahier des charges du projet fil rouge."

  - title: "Processus Daily Scrum"
    path: "process-daily.md"
    duration: 10
    summary: "Routine quotidienne de l'équipe : daily matin et validation soir."

  - title: "Présentations du projet"
    path: "presentations.md"
    duration: 15
    summary: "Formats et attendus des présentations tout au long du bloc."

  # ── Guides méthodologie ───────────────────────────────────────────
  - title: "Guide · SCRUM"
    path: "guides/methodologie/scrum.md"
    duration: 30
    summary: "Introduction à SCRUM : rôles, rituels, artefacts."

  - title: "Guide · Ergonomie"
    path: "guides/methodologie/ergonomie.md"
    duration: 25
    summary: "Principes d'ergonomie pour interfaces web."

  - title: "Guide · Structure d'un projet web"
    path: "guides/methodologie/structure-projet.md"
    duration: 20
    summary: "Organisation recommandée des dossiers et fichiers."

  - title: "Guide · Template Marp"
    path: "guides/outils/template-marp.md"
    duration: 15
    summary: "Utiliser Marp pour produire des présentations en Markdown."

  # ── Guides PHP ────────────────────────────────────────────────────
  - title: "Guide · PHP — Fondamentaux"
    path: "guides/php/php-fondamentaux.md"
    duration: 45
    summary: "Syntaxe PHP, variables, tableaux, fonctions, formulaires."

  - title: "Guide · MVC"
    path: "guides/php/mvc.md"
    duration: 40
    summary: "Architecture Modèle-Vue-Contrôleur, Composer, moteur de template."

  - title: "Guide · PDO"
    path: "guides/php/pdo-php.md"
    duration: 40
    summary: "Accès base de données avec PDO, requêtes préparées, sécurité."

  - title: "Guide · Tests unitaires PHP"
    path: "guides/php/tests-unitaires.md"
    duration: 30
    summary: "Mise en place et écriture de tests unitaires avec PHPUnit."

  # ── Guide JavaScript ──────────────────────────────────────────────
  - title: "Guide · JavaScript — Fondamentaux"
    path: "guides/javascript/js-fondamentaux.md"
    duration: 45
    summary: "Syntaxe JS, DOM, événements, validation de formulaires."

  # ── Prosits (boucles PBL) ─────────────────────────────────────────
  - title: "Prosit 1 — Apache et HTTP"
    path: "prosits/1-apache.md"
    duration: 60
    summary: "Serveur Apache, protocole HTTP, hôtes virtuels, HTTPS."

  - title: "Prosit 2 — PHP : Formulaires, Pagination et POO"
    path: "prosits/2-php.md"
    duration: 90
    summary: "PHP dynamique, formulaires, upload sécurisé, pagination, POO."
    prerequis: ["1-apache"]

  - title: "Prosit 3 — MVC, Composer et moteur de template"
    path: "prosits/3-mvc.md"
    duration: 90
    summary: "Architecture MVC, Composer, moteur de template Twig."
    prerequis: ["2-php"]

  - title: "Prosit 4 — PDO, Sessions et Authentification"
    path: "prosits/4-pdo.md"
    duration: 90
    summary: "PDO, requêtes préparées, sessions, cookies, authentification."
    prerequis: ["3-mvc"]

  - title: "Prosit 5 — Dynamiser côté front"
    path: "prosits/5-js.md"
    duration: 90
    summary: "JavaScript, DOM, événements, validation côté client."
    prerequis: ["4-pdo"]

  # ── Workshops ─────────────────────────────────────────────────────
  - title: "Workshop 2 — PHP"
    path: "workshops/2-php.md"
    duration: 120
    summary: "PHP — Upload sécurisé, pagination dynamique, validation."
    prerequis: ["2-php"]

  - title: "Workshop 2bis — Exercices PHP supplémentaires"
    path: "workshops/supplementaires/2bis-php.md"
    duration: 90
    summary: "Exercices de renforcement : catalogue de bibliothèque."

  - title: "Workshop 4 — PDO"
    path: "workshops/4-pdo.md"
    duration: 120
    summary: "Mise en pratique PDO avec requêtes préparées."
    prerequis: ["4-pdo"]

  - title: "Workshop 5 — JavaScript"
    path: "workshops/5-js.md"
    duration: 120
    summary: "Dynamisation d'une interface avec JavaScript."
    prerequis: ["5-js"]

  # ── Mini-projets ──────────────────────────────────────────────────
  - title: "Mini-projet 1 — Pizzeria Bella Napoli"
    path: "mini-projet/1-pizzeria.md"
    duration: 180
    summary: "Site vitrine et commande pour une pizzeria en PHP."

  - title: "Mini-projet 2 — La Canardothèque"
    path: "mini-projet/2-canard.md"
    duration: 240
    summary: "Application MVC de gestion d'une canardothèque."
    prerequis: ["3-mvc"]

  - title: "Mini-projet 3 — La Guilde des Aventuriers"
    path: "mini-projet/3-guilde.md"
    duration: 240
    summary: "Application complète avec PDO et authentification."
    prerequis: ["4-pdo"]

