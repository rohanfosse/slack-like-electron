<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4A90D9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- CSP : taille minimale necessaire pour faire tourner Pyodide (runner
         .ipynb dans Lumen). Decomposition :
          * 'wasm-unsafe-eval' : compile() le binaire WebAssembly de Pyodide
          * 'unsafe-eval'      : Pyodide cree des fonctions JS dynamiquement
            (`new Function(...)`) pour boot Python. Sans ca, le kernel ne
            demarre pas. Pas evitable sans isoler Pyodide dans un iframe
            sandbox dedie (TODO si surface d'attaque inacceptable).
          * blob:              : workers Pyodide
          * cdn.jsdelivr.net   : Pyodide est servi depuis ce CDN, pas bundle
          * sha256-…           : hashes des `<script>` inline injectes par
            Pyodide au bootstrap. Stables tant qu'on ne bump pas la version
            (cf. PYODIDE_VERSION dans usePyodide.ts) — a regenerer si la
            console reaffiche des violations apres update. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'wasm-unsafe-eval' 'unsafe-eval' blob: https://cdn.jsdelivr.net 'sha256-ieoeWczDHkReVBsRBqaal5AFMlBtNjMzgwKvLqi/tSU=' 'sha256-JxyrKzp5Kh5pc2Lw/HjAs0nLS7UzPNYGDMEHKAhbG04=' 'sha256-TmLb6a1AwewHOfJqzGNbSl9+hSWUiawC5uGKQvy1d38=';
        style-src   'self';
        worker-src  'self' blob:;
        img-src     'self' data: blob: https: http:;
        media-src   'self' data: blob: https: http:;
        font-src    'self' data:;
        frame-src   'self' blob:;
        object-src  'none';
        connect-src 'self' https: http: wss: ws: data: blob:;
      "
    />
    <title>Cursus - Plateforme pédagogique</title>
    <meta name="description" content="Cursus - Messagerie, devoirs, documents et suivi de formation en un seul endroit." />
    <meta property="og:title" content="Cursus" />
    <meta property="og:description" content="Plateforme pédagogique tout-en-un." />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://app.cursus.school/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main-web.ts"></script>
  </body>
</html>
