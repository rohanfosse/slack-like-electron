<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient matching Cursus app branding (blue-teal-green) -->
    <linearGradient id="spark-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="spark-glow" x1="20" y1="4" x2="44" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="28" fill="url(#spark-grad)" opacity=".08"/>

  <!-- Lightning bolt -->
  <path
    d="M36 4 L14 34 L28 34 L24 60 L50 26 L34 26 Z"
    fill="url(#spark-grad)"
    opacity=".15"
    stroke="url(#spark-glow)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Inner bright core of the bolt -->
  <path
    d="M34.5 10 L18 34 L29 34 L26 54 L46 28 L34 28 Z"
    fill="none"
    stroke="url(#spark-grad)"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Sparkle dots around the bolt -->
  <circle cx="12" cy="18" r="1.8" fill="#FCD34D" opacity=".7"/>
  <circle cx="52" cy="14" r="1.4" fill="#F97316" opacity=".6"/>
  <circle cx="54" cy="44" r="1.8" fill="#FCD34D" opacity=".5"/>
  <circle cx="10" cy="46" r="1.2" fill="#F97316" opacity=".6"/>

  <!-- Small star sparkles -->
  <path d="M8 30 L9.5 28 L11 30 L9.5 32Z" fill="#FCD34D" opacity=".5"/>
  <path d="M55 22 L56.5 20 L58 22 L56.5 24Z" fill="#F97316" opacity=".4"/>
</svg>
