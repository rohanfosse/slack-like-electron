<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient matching Cursus app branding (blue-teal-green) -->
    <linearGradient id="pulse-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="pulse-ecg" x1="0" y1="32" x2="64" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Heart shape -->
  <path
    d="M32 56 C32 56 6 40 6 22 C6 13.2 13.2 6 22 6 C26.8 6 30.8 8.4 32 12 C33.2 8.4 37.2 6 42 6 C50.8 6 58 13.2 58 22 C58 40 32 56 32 56Z"
    fill="url(#pulse-grad)"
    opacity="0.15"
    stroke="url(#pulse-grad)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- ECG lifeline crossing through the heart -->
  <polyline
    points="4,34 16,34 20,34 24,26 28,42 32,18 36,38 40,28 44,34 48,34 60,34"
    fill="none"
    stroke="url(#pulse-grad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
