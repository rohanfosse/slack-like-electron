<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 'wasm-unsafe-eval' + jsdelivr + blob: requis pour Pyodide (runner .ipynb dans Lumen) :
         pyodide.js est chargé depuis le CDN, ses packages Python (numpy, matplotlib...) sont
         fetched via connect-src, et le WASM est instancié via wasm-unsafe-eval. Le runner est
         opt-in (bouton Exécuter sur un chapitre .ipynb) — pas de chargement passif. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net;
        style-src   'self';
        worker-src  'self' blob:;
        connect-src 'self' blob: data: https://cdn.jsdelivr.net https://app.cursus.school wss://app.cursus.school https://cursus.devrohan.cloud wss://cursus.devrohan.cloud http://localhost:3001 ws://localhost:3001;
        img-src     'self' data: blob: https://app.cursus.school https://cursus.devrohan.cloud http://localhost:3001;
        media-src   'self' data: blob: https://app.cursus.school http://localhost:3001;
        font-src    'self' data:;
        frame-src   'self' blob: data: https://app.cursus.school http://localhost:3001;
        object-src  'self' blob: data: https://app.cursus.school http://localhost:3001;
        base-uri    'none';
      "
    />
    <title>Cursus</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
